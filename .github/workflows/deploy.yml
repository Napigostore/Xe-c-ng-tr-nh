name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://dochoinhapkhau.tienso.vn

      - name: Add delivery banner
        run: |
          python - <<'PY'
          from pathlib import Path
          banner = '<div style="background:#16202a;color:#fff;text-align:center;font-weight:900;font-size:14px;padding:8px 12px">Giao noi thanh hoa toc 30 phut - Di tinh nhan hang 1-4 ngay</div>'
          for path in Path('out').glob('**/*.html'):
              html = path.read_text(encoding='utf-8')
              if 'Giao noi thanh hoa toc 30 phut' not in html:
                  html = html.replace('<body>', '<body>' + banner, 1)
                  path.write_text(html, encoding='utf-8')
          PY

      - name: Add nojekyll file
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
